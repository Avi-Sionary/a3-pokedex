<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://colorjs.io/dist/color.global.js"></script>
    <script src="https://unpkg.com/pokeapi-js-wrapper@1.1.2"></script>
    <script src="pokemon.js"></script>
    <script src="utility.js"></script>
    <script src="search_page.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="media/favicon.ico">

    <title>Pokédex!</title>
</head>

<body onload="loadSearchPage()">
    <main id="dex_shell">

        <section id="dex_header">
            <h1>Pokedex!</h1>

            <div id="dex_topbar">
                <input id="search" placeholder="Search by name">

            <div id="type_dropdown">
                <button id="type_dropdown_button" type="button" onclick="toggleTypeDropdown()">
                    ???
                </button>

                <div id="type_dropdown_menu" class="hide">
                    <label><input type="checkbox" value="bug" onchange="updateSearchResults()"> <img src="media/types/BugIC_ZA.png"></label>
                    <label><input type="checkbox" value="dark" onchange="updateSearchResults()"> <img src="media/types/DarkIC_ZA.png"></label>
                    <label><input type="checkbox" value="dragon" onchange="updateSearchResults()"> <img src="media/types/DragonIC_ZA.png"></label>
                    <label><input type="checkbox" value="electric" onchange="updateSearchResults()"> <img src="media/types/ElectricIC_ZA.png"></label>
                    <label><input type="checkbox" value="fairy" onchange="updateSearchResults()"> <img src="media/types/FairyIC_ZA.png"></label>
                    <label><input type="checkbox" value="fighting" onchange="updateSearchResults()"> <img src="media/types/FightingIC_ZA.png"></label>
                    <label><input type="checkbox" value="fire" onchange="updateSearchResults()"> <img src="media/types/FireIC_ZA.png"></label>
                    <label><input type="checkbox" value="flying" onchange="updateSearchResults()"> <img src="media/types/FlyingIC_ZA.png"></label>
                    <label><input type="checkbox" value="ghost" onchange="updateSearchResults()"> <img src="media/types/GhostIC_ZA.png"></label>
                    <label><input type="checkbox" value="grass" onchange="updateSearchResults()"> <img src="media/types/GrassIC_ZA.png"></label>
                    <label><input type="checkbox" value="ground" onchange="updateSearchResults()"> <img src="media/types/GroundIC_ZA.png"></label>
                    <label><input type="checkbox" value="ice" onchange="updateSearchResults()"> <img src="media/types/IceIC_ZA.png"></label>
                    <label><input type="checkbox" value="normal" onchange="updateSearchResults()"> <img src="media/types/NormalIC_ZA.png"></label>
                    <label><input type="checkbox" value="poison" onchange="updateSearchResults()"> <img src="media/types/PoisonIC_ZA.png"></label>
                    <label><input type="checkbox" value="psychic" onchange="updateSearchResults()"> <img src="media/types/PsychicIC_ZA.png"></label>
                    <label><input type="checkbox" value="rock" onchange="updateSearchResults()"> <img src="media/types/RockIC_ZA.png"></label>
                    <label><input type="checkbox" value="steel" onchange="updateSearchResults()"> <img src="media/types/SteelIC_ZA.png"></label>
                    <label><input type="checkbox" value="water" onchange="updateSearchResults()"> <img src="media/types/WaterIC_ZA.png"></label>
                    <label><input type="checkbox" value="unknown" onchange="updateSearchResults()"> <img src="media/types/UnknownIC_ZA.png"></label>
                </div>
            </div>
            </div>
        </section>

        <section id="dex_main">
            <div id="preview_panel">
                <img id="preview_sprite">
            </div>

            <div id="dex_right_panel">
                <div id="preview_info">
                    <span id="preview_number"></span>
                    <span id="preview_name"></span>
                </div>

                <div id="pokemon_list"></div>
            </div>
        </section>

        <section id="preview_types_panel">
            <div class="type-box">
                <div class="type-title">TYPE 1</div>
                <img id="preview_type1">
            </div>

            <div class="type-box">
                <div class="type-title">TYPE 2</div>
                <img id="preview_type2">
            </div>
        </section>

        <div id="spinner" class="spinner-border" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>

        <span id="number_pokemon" hidden>0</span>
    </main>
</body>
</html>
